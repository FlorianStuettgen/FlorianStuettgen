name: One-time profile branch cleanup

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/cleanup-profile-branches.yml

permissions:
  contents: write

jobs:
  delete-non-main-branches:
    if: github.repository == 'FlorianStuettgen/FlorianStuettgen'
    runs-on: ubuntu-latest
    steps:
      - name: Delete every non-default branch
        env:
          GH_TOKEN: ${{ github.token }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t branches < <(
            gh api --paginate "repos/${GITHUB_REPOSITORY}/branches?per_page=100" --jq '.[].name'
          )

          for branch in "${branches[@]}"; do
            if [[ "$branch" == "$DEFAULT_BRANCH" ]]; then
              continue
            fi

            echo "Deleting branch: $branch"
            gh api --method DELETE "repos/${GITHUB_REPOSITORY}/git/refs/heads/${branch}"
          done

          mapfile -t remaining < <(
            gh api --paginate "repos/${GITHUB_REPOSITORY}/branches?per_page=100" --jq '.[].name'
          )

          if (( ${#remaining[@]} != 1 )) || [[ "${remaining[0]}" != "$DEFAULT_BRANCH" ]]; then
            printf 'Unexpected remaining branches:\n'
            printf ' - %s\n' "${remaining[@]}"
            exit 1
          fi

          echo "Only ${DEFAULT_BRANCH} remains."

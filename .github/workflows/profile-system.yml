name: Build profile operating system

on:
  workflow_dispatch:
  issues:
    types: [opened]
  schedule:
    - cron: "17 11 * * *"
  push:
    paths:
      - ".profile-source/**"
      - "scripts/render_profile.py"
      - ".github/workflows/profile-system.yml"

permissions:
  contents: write

concurrency:
  group: profile-system
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out profile repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Materialize readable source
        shell: bash
        run: |
          if [ -d .profile-source ]; then
            mkdir -p scripts
            cat .profile-source/render-*.txt > scripts/render_profile.py
            cat .profile-source/readme-*.txt > README.md
            rm -rf .profile-source .profile-bootstrap
            rm -f assets/profile-banner.svg assets/portfolio-map.svg
          fi

      - name: Render theme-aware profile assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/render_profile.py

      - name: Validate generated interface
        run: |
          python -m py_compile scripts/render_profile.py
          python - <<'PY'
          from pathlib import Path
          import xml.etree.ElementTree as ET

          files = sorted(Path("assets").glob("*.svg"))
          expected = 18
          if len(files) != expected:
              raise SystemExit(f"Expected {expected} generated SVG files; found {len(files)}")
          for path in files:
              ET.parse(path)
          readme = Path("README.md").read_text(encoding="utf-8")
          required = ["hero-dark.svg", "route-recruiter-dark.svg", "live-status-dark.svg", "technical-review"]
          missing = [item for item in required if item not in readme]
          if missing:
              raise SystemExit(f"README is missing required interface references: {missing}")
          print(f"Validated {len(files)} SVG surfaces and README interface references")
          PY

      - name: Commit generated profile
        run: |
          if git diff --quiet && [ -z "$(git status --porcelain)" ]; then
            echo "Profile operating system is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Launch generated profile operating system"
          git push

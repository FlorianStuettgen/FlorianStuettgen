<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="470" viewBox="0 0 1400 470" role="img" aria-labelledby="title desc">
  <title id="title">Florian Stuettgen career architecture</title>
  <desc id="desc">Timeline connecting field execution, project delivery, controls governance, data engineering, and decision systems.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#07111f"/><stop offset="1" stop-color="#0a1628"/></linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse"><path d="M32 0H0V32" fill="none" stroke="#29405c" stroke-opacity="0.28" stroke-width="1"/></pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#000000" flood-opacity="0.20"/></filter>
    <style>
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; }
      .mono { font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; }
      .title { fill: #f8fafc; font-weight: 800; letter-spacing: -1px; }
      .muted { fill: #6f8197; }
      .label { fill: #38bdf8; font-size: 16px; font-weight: 800; letter-spacing: 2px; }
      .panel2 { fill: #101f34; stroke: #29405c; stroke-width: 1.2; }
      .pulse { transform-box: fill-box; transform-origin: center; animation: pulse 2.8s ease-in-out infinite; }
      @keyframes pulse { 0%,100% { opacity:.35; transform:scale(.88); } 50% { opacity:1; transform:scale(1.12); } }
      @media (prefers-reduced-motion: reduce) { .pulse { animation:none !important; } }
    </style>
  </defs>
  <rect width="1400" height="470" rx="28" fill="url(#bg)"/>
  <rect width="1400" height="470" rx="28" fill="url(#grid)" opacity="0.36"/>
  <text x="54" y="62" font-size="15" class="label mono" font-weight="850">THE CAREER ARC IS THE ARCHITECTURE</text>
  <text x="54" y="105" font-size="26" class="title sans" font-weight="850">One perspective is useful. The integration is the advantage.</text>
  <path d="M95 215 H1305" stroke="#29405c" stroke-width="8" stroke-linecap="round"/>
  <circle cx="110" cy="215" r="22" fill="#0d1b2d" stroke="#fbbf24" stroke-width="6" class="pulse"/>
  <text x="110" y="169" font-size="12" class="mono" text-anchor="middle" font-weight="900" fill="#fbbf24">FIELD</text>
  <rect x="2" y="260" width="216" height="154" rx="18" class="panel2" filter="url(#shadow)"/>
  <text x="22" y="295" font-size="16" class="title sans" font-weight="820">Journeyman</text><text x="22" y="317" font-size="16" class="title sans" font-weight="820">Steamfitter-Pipefitter</text>
  <text x="22" y="349" font-size="11" class="muted mono" font-weight="700">Constructability • sequence</text><text x="22" y="368" font-size="11" class="muted mono" font-weight="700">constraints • real progress</text>
  <circle cx="365" cy="215" r="22" fill="#0d1b2d" stroke="#fb7185" stroke-width="6"/>
  <text x="365" y="169" font-size="12" class="mono" text-anchor="middle" font-weight="900" fill="#fb7185">DELIVERY</text>
  <rect x="257" y="260" width="216" height="154" rx="18" class="panel2" filter="url(#shadow)"/>
  <text x="277" y="295" font-size="16" class="title sans" font-weight="820">Industrial construction</text><text x="277" y="317" font-size="16" class="title sans" font-weight="820">+ supervision</text>
  <text x="277" y="349" font-size="11" class="muted mono" font-weight="700">Workfaces • crews • shutdowns</text><text x="277" y="368" font-size="11" class="muted mono" font-weight="700">execution pressure</text>
  <circle cx="620" cy="215" r="22" fill="#0d1b2d" stroke="#38bdf8" stroke-width="6"/>
  <text x="620" y="169" font-size="12" class="mono" text-anchor="middle" font-weight="900" fill="#38bdf8">CONTROLS</text>
  <rect x="512" y="260" width="216" height="154" rx="18" class="panel2" filter="url(#shadow)"/>
  <text x="532" y="295" font-size="16" class="title sans" font-weight="820">Cost • schedule • risk</text><text x="532" y="317" font-size="16" class="title sans" font-weight="820">change • governance</text>
  <text x="532" y="349" font-size="11" class="muted mono" font-weight="700">Forecasts • EVM • stage gates</text><text x="532" y="368" font-size="11" class="muted mono" font-weight="700">executive decisions</text>
  <circle cx="875" cy="215" r="22" fill="#0d1b2d" stroke="#34d399" stroke-width="6"/>
  <text x="875" y="169" font-size="12" class="mono" text-anchor="middle" font-weight="900" fill="#34d399">DATA</text>
  <rect x="767" y="260" width="216" height="154" rx="18" class="panel2" filter="url(#shadow)"/>
  <text x="787" y="295" font-size="16" class="title sans" font-weight="820">SQL • Python • ETL</text><text x="787" y="317" font-size="16" class="title sans" font-weight="820">automation • analytics</text>
  <text x="787" y="349" font-size="11" class="muted mono" font-weight="700">Models • validation • lineage</text><text x="787" y="368" font-size="11" class="muted mono" font-weight="700">repeatable reporting</text>
  <circle cx="1130" cy="215" r="22" fill="#0d1b2d" stroke="#a78bfa" stroke-width="6"/>
  <text x="1130" y="169" font-size="12" class="mono" text-anchor="middle" font-weight="900" fill="#a78bfa">SYSTEMS</text>
  <rect x="1022" y="260" width="216" height="154" rx="18" class="panel2" filter="url(#shadow)"/>
  <text x="1042" y="295" font-size="16" class="title sans" font-weight="820">Decision architecture</text><text x="1042" y="317" font-size="16" class="title sans" font-weight="820">+ executable assurance</text>
  <text x="1042" y="349" font-size="11" class="muted mono" font-weight="700">Rules • exceptions • evidence</text><text x="1042" y="368" font-size="11" class="muted mono" font-weight="700">defensible action</text>
  <text x="700" y="444" font-size="12" class="mono" text-anchor="middle" font-weight="850" fill="#6f8197">NOT A SOFTWARE ENGINEER WHO VISITED A SITE. NOT A CONTROLS PROFESSIONAL WHO OCCASIONALLY SCRIPTS.</text>
  <rect x="1" y="1" width="1398" height="468" rx="27" fill="none" stroke="#29405c" stroke-opacity="0.75"/>
</svg>
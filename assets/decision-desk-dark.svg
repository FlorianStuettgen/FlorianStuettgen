<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="360" viewBox="0 0 1400 360" role="img" aria-labelledby="title desc"><title id="title">Real Estate Decision Desk project card</title><desc id="desc">Decision architecture showing gates, evidence, cost, scoring, sensitivity, and decision history.</desc><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#07111f"/><stop offset="1" stop-color="#0a1628"/></linearGradient><pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse"><path d="M32 0H0V32" fill="none" stroke="#29405c" stroke-opacity=".28"/></pattern><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#000" flood-opacity=".2"/></filter><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0v6l9-3z" fill="#38bdf8"/></marker><style>.sans{font-family:Inter,system-ui,-apple-system,"Segoe UI",Arial,sans-serif}.mono{font-family:Consolas,"Liberation Mono",Menlo,monospace}.title{fill:#f8fafc;font-weight:800;letter-spacing:-1px}.body{fill:#a9b7c9}.muted{fill:#6f8197}.label{font-size:16px;font-weight:800;letter-spacing:2px}.panel{fill:#0d1b2d;stroke:#29405c;stroke-width:1.3}.panel2{fill:#101f34;stroke:#29405c;stroke-width:1.2}</style></defs><rect width="1400" height="360" rx="28" fill="url(#bg)"/><rect width="1400" height="360" rx="28" fill="url(#grid)" opacity=".36"/><rect x="28" y="28" width="1344" height="304" rx="24" class="panel" filter="url(#shadow)"/><text x="58" y="68" font-size="13" class="label mono" font-weight="850" fill="#a78bfa">EXPERIMENT 03 / DECISION ARCHITECTURE</text><text x="58" y="111" font-size="28" class="title sans" font-weight="900">REAL ESTATE DECISION DESK</text><text x="58" y="141" font-size="16" class="body sans" font-weight="650">A design-stage system that refuses to average away non-negotiables or hide uncertainty.</text><rect x="1150" y="52" width="152" height="34" rx="17" fill="#a78bfa" fill-opacity=".12" stroke="#a78bfa" stroke-opacity=".55"/><text x="1226" y="74" font-size="13" class="mono" text-anchor="middle" font-weight="700" fill="#a78bfa">DESIGN STAGE</text><g class="mono"><rect x="58" y="179" width="190" height="104" rx="16" class="panel2"/><text x="76" y="206" font-size="11" font-weight="850" fill="#fb7185">01</text><text x="76" y="233" font-size="14" class="title" font-weight="900" fill="#fb7185">GATE</text><text x="76" y="260" font-size="10" class="muted" font-weight="700">mandatory requirements</text><path d="M248 231h20" stroke="#38bdf8" stroke-width="2.5" marker-end="url(#arrow)"/><rect x="274" y="179" width="190" height="104" rx="16" class="panel2"/><text x="292" y="206" font-size="11" font-weight="850" fill="#38bdf8">02</text><text x="292" y="233" font-size="14" class="title" font-weight="900" fill="#38bdf8">EVIDENCE</text><text x="292" y="260" font-size="10" class="muted" font-weight="700">facts vs assumptions</text><path d="M464 231h20" stroke="#38bdf8" stroke-width="2.5" marker-end="url(#arrow)"/><rect x="490" y="179" width="190" height="104" rx="16" class="panel2"/><text x="508" y="206" font-size="11" font-weight="850" fill="#fbbf24">03</text><text x="508" y="233" font-size="14" class="title" font-weight="900" fill="#fbbf24">COST</text><text x="508" y="260" font-size="10" class="muted" font-weight="700">entry + repair exposure</text><path d="M680 231h20" stroke="#38bdf8" stroke-width="2.5" marker-end="url(#arrow)"/><rect x="706" y="179" width="190" height="104" rx="16" class="panel2"/><text x="724" y="206" font-size="11" font-weight="850" fill="#a78bfa">04</text><text x="724" y="233" font-size="14" class="title" font-weight="900" fill="#a78bfa">SCORE</text><text x="724" y="260" font-size="10" class="muted" font-weight="700">weighted preferences</text><path d="M896 231h20" stroke="#38bdf8" stroke-width="2.5" marker-end="url(#arrow)"/><rect x="922" y="179" width="190" height="104" rx="16" class="panel2"/><text x="940" y="206" font-size="11" font-weight="850" fill="#34d399">05</text><text x="940" y="233" font-size="14" class="title" font-weight="900" fill="#34d399">SENSITIVITY</text><text x="940" y="260" font-size="10" class="muted" font-weight="700">what reverses the choice</text><path d="M1112 231h20" stroke="#38bdf8" stroke-width="2.5" marker-end="url(#arrow)"/><rect x="1138" y="179" width="190" height="104" rx="16" class="panel2"/><text x="1156" y="206" font-size="11" font-weight="850" fill="#38bdf8">06</text><text x="1156" y="233" font-size="14" class="title" font-weight="900" fill="#38bdf8">DECISION</text><text x="1156" y="260" font-size="10" class="muted" font-weight="700">advance / hold / reject</text></g><text x="58" y="315" font-size="11" class="mono" font-weight="850" fill="#a78bfa">THIS PROJECT PROVES THE DECISION MODEL COMES BEFORE THE DATABASE.</text><rect x="1" y="1" width="1398" height="358" rx="27" fill="none" stroke="#29405c" stroke-opacity=".75"/></svg>
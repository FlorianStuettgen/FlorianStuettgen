<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="360" viewBox="0 0 1600 360" role="img" aria-labelledby="title desc">
  <title id="title">EQ-Proof close assurance aperture</title>
  <desc id="desc">Compact evidence view showing a blocked monthly close, reported EAC of 407 million dollars, defensible EAC of 418 million dollars, an 11 million dollar deterministic gap, and a 483 million dollar reconstructed risk-adjusted position.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07100f"/>
      <stop offset="1" stop-color="#0d1d1a"/>
    </linearGradient>
    <linearGradient id="gate" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#431f22"/>
      <stop offset="1" stop-color="#142522"/>
    </linearGradient>
    <style>
      .ui{font-family:Inter,Segoe UI,Arial,sans-serif}.mono{font-family:Consolas,Menlo,monospace}.bright{fill:#effaf6}.muted{fill:#8fa9a1}.green{fill:#65f5c6}.red{fill:#ff8188}.amber{fill:#ffcc66}.label{font-size:14px;font-weight:700;letter-spacing:2px}.title{font-size:38px;font-weight:900;letter-spacing:-1px}.value{font-size:42px;font-weight:900;letter-spacing:-2px}.small{font-size:14px}.card{fill:#10211e;stroke:#29413b}.hair{stroke:#29413b;stroke-width:1}
    </style>
  </defs>
  <rect width="1600" height="360" rx="22" fill="url(#bg)"/>
  <rect x="30" y="28" width="1540" height="304" rx="18" fill="#0b1715" stroke="#29413b"/>
  <g class="ui">
    <rect x="56" y="50" width="36" height="36" rx="10" fill="#17352d" stroke="#65f5c6"/>
    <text x="74" y="74" text-anchor="middle" class="green" font-size="15" font-weight="900">EQ</text>
    <text x="106" y="66" class="bright" font-size="19" font-weight="800">EQ-Proof</text>
    <text x="106" y="84" class="muted" font-size="10" letter-spacing="2">CONTROL ROOM</text>
    <text x="1518" y="72" text-anchor="end" class="muted mono" font-size="12">LOCAL-FIRST · SYNTHETIC EVIDENCE</text>

    <rect x="56" y="108" width="514" height="178" rx="16" fill="url(#gate)" stroke="#6b3438"/>
    <text x="84" y="143" class="red label">EXECUTIVE CLOSE GATE</text>
    <text x="84" y="194" class="red title">CLOSE BLOCKED</text>
    <text x="84" y="224" class="bright" font-size="16">Reported EAC contradicts governed AC + ETC.</text>
    <text x="84" y="252" class="muted small">The reconstructed risk-adjusted position is $76M above the submitted forecast.</text>

    <g transform="translate(596 108)">
      <rect width="218" height="178" rx="16" class="card"/>
      <text x="22" y="38" class="muted label">REPORTED EAC</text>
      <text x="22" y="98" class="bright value">$407M</text>
      <text x="22" y="132" class="muted small">submitted state</text>
    </g>
    <g transform="translate(832 108)">
      <rect width="218" height="178" rx="16" class="card"/>
      <text x="22" y="38" class="muted label">DEFENSIBLE EAC</text>
      <text x="22" y="98" class="bright value">$418M</text>
      <text x="22" y="132" class="muted small">AC + ETC</text>
    </g>
    <g transform="translate(1068 108)">
      <rect width="218" height="178" rx="16" class="card"/>
      <text x="22" y="38" class="amber label">DETERMINISTIC GAP</text>
      <text x="22" y="98" class="amber value">$11M</text>
      <text x="22" y="132" class="muted small">governed contradiction</text>
    </g>
    <g transform="translate(1304 108)">
      <rect width="218" height="178" rx="16" fill="#132b25" stroke="#367360"/>
      <text x="22" y="38" class="green label">RISK-ADJUSTED</text>
      <text x="22" y="98" class="green value">$483M</text>
      <text x="22" y="132" class="muted small">reconstructed position</text>
    </g>

    <line x1="56" y1="307" x2="1522" y2="307" class="hair"/>
    <text x="56" y="326" class="muted mono" font-size="12">SOURCE RECORD → EXECUTED CONTROL → EXCEPTION → CLOSE DECISION</text>
  </g>
</svg>
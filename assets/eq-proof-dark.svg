<svg xmlns="http://www.w3.org/2000/svg" width="680" height="470" viewBox="0 0 680 470" role="img" aria-labelledby="title desc">
  <title id="title">EQ-Proof Control Room project card</title>
  <desc id="desc">Project card showing reported, defensible, and risk-adjusted forecast positions and evidence flow.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#07111f"/><stop offset="1" stop-color="#0a1628"/></linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse"><path d="M32 0H0V32" fill="none" stroke="#29405c" stroke-opacity="0.28" stroke-width="1"/></pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#000000" flood-opacity="0.20"/></filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#38bdf8"/></marker>
    <style>
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; }
      .mono { font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; }
      .title { fill: #f8fafc; font-weight: 800; letter-spacing: -1px; }
      .body { fill: #a9b7c9; }
      .muted { fill: #6f8197; }
      .label { fill: #38bdf8; font-size: 16px; font-weight: 800; letter-spacing: 2px; }
      .panel { fill: #0d1b2d; stroke: #29405c; stroke-width: 1.3; }
      .panel2 { fill: #101f34; stroke: #29405c; stroke-width: 1.2; }
      .flow { fill: none; stroke: #38bdf8; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>
  <rect width="680" height="470" rx="28" fill="url(#bg)"/>
  <rect width="680" height="470" rx="28" fill="url(#grid)" opacity="0.36"/>
  <rect x="18" y="18" width="644" height="434" rx="24" class="panel" filter="url(#shadow)"/>
  <text x="44" y="58" font-size="13" class="label mono" font-weight="850">FLAGSHIP 01 / PROJECT CONTROLS</text>
  <text x="44" y="101" font-size="29" class="title sans" font-weight="900">EQ-PROOF CONTROL ROOM</text>
  <text x="44" y="132" font-size="16" class="body sans" font-weight="650">Executable assurance for the monthly close</text>
  <rect x="500" y="42" width="104" height="34" rx="17" fill="#38bdf8" fill-opacity="0.12" stroke="#38bdf8" stroke-opacity="0.55"/><text x="552" y="64" font-size="13" class="mono" text-anchor="middle" font-weight="700" fill="#38bdf8">BETA</text>
  <rect x="44" y="166" width="128" height="118" rx="16" class="panel2"/><rect x="44" y="166" width="128" height="4" rx="2" fill="#6f8197"/>
  <text x="108" y="205" font-size="23" class="title mono" text-anchor="middle" font-weight="950" fill="#6f8197">$407M</text><text x="108" y="236" font-size="9" class="muted mono" text-anchor="middle" font-weight="800">REPORTED EAC</text><text x="108" y="260" font-size="10" class="body mono" text-anchor="middle" font-weight="700">submitted position</text>
  <rect x="190" y="166" width="128" height="118" rx="16" class="panel2"/><rect x="190" y="166" width="128" height="4" rx="2" fill="#38bdf8"/>
  <text x="254" y="205" font-size="23" class="title mono" text-anchor="middle" font-weight="950" fill="#38bdf8">$418M</text><text x="254" y="236" font-size="9" class="muted mono" text-anchor="middle" font-weight="800">DEFENSIBLE EAC</text><text x="254" y="260" font-size="10" class="body mono" text-anchor="middle" font-weight="700">AC + ETC</text>
  <rect x="336" y="166" width="128" height="118" rx="16" class="panel2"/><rect x="336" y="166" width="128" height="4" rx="2" fill="#34d399"/>
  <text x="400" y="205" font-size="23" class="title mono" text-anchor="middle" font-weight="950" fill="#34d399">$483M</text><text x="400" y="236" font-size="9" class="muted mono" text-anchor="middle" font-weight="800">DEFENSIBLE P80</text><text x="400" y="260" font-size="10" class="body mono" text-anchor="middle" font-weight="700">+ change + risk</text>
  <path d="M172 225 H184" stroke="#38bdf8" stroke-width="2.5" marker-end="url(#arrow)"/><text x="178" y="199" font-size="9" class="mono" text-anchor="middle" font-weight="850" fill="#38bdf8">+$11M</text>
  <path d="M318 225 H330" stroke="#34d399" stroke-width="2.5" marker-end="url(#arrow)"/><text x="324" y="199" font-size="9" class="mono" text-anchor="middle" font-weight="850" fill="#34d399">+$65M</text>
  <rect x="488" y="166" width="144" height="118" rx="16" class="panel2"/>
  <text x="560" y="205" font-size="27" class="title mono" text-anchor="middle" font-weight="950" fill="#fb7185">$76M</text><text x="560" y="232" font-size="9" class="muted mono" text-anchor="middle" font-weight="800">HIDDEN EXPOSURE</text><text x="560" y="256" font-size="12" class="title mono" text-anchor="middle" font-weight="850" fill="#fbbf24">3 BLOCKERS</text><text x="560" y="275" font-size="9" class="muted mono" text-anchor="middle" font-weight="750">29 CONTROLS</text>
  <text x="44" y="326" font-size="10" class="muted mono" font-weight="800">SOURCE FILES</text><text x="215" y="326" font-size="10" class="muted mono" font-weight="800">EXECUTABLE CONTROLS</text><text x="455" y="326" font-size="10" class="muted mono" font-weight="800">DECISION RECORD</text>
  <path d="M56 349 H586" class="flow" marker-end="url(#arrow)" opacity="0.58"/>
  <circle cx="66" cy="349" r="8" fill="#38bdf8"/><text x="66" y="377" font-size="9" class="muted mono" text-anchor="middle" font-weight="750">P6 XER</text>
  <circle cx="146" cy="349" r="8" fill="#38bdf8"/><text x="146" y="377" font-size="9" class="muted mono" text-anchor="middle" font-weight="750">COST CSV</text>
  <circle cx="271" cy="349" r="8" fill="#38bdf8"/><text x="271" y="377" font-size="9" class="muted mono" text-anchor="middle" font-weight="750">EQUATIONS</text>
  <circle cx="380" cy="349" r="8" fill="#38bdf8"/><text x="380" y="377" font-size="9" class="muted mono" text-anchor="middle" font-weight="750">EXCEPTIONS</text>
  <circle cx="512" cy="349" r="8" fill="#34d399"/><text x="512" y="377" font-size="9" class="muted mono" text-anchor="middle" font-weight="750">GO / NO-GO</text>
  <text x="44" y="428" font-size="10" class="mono" font-weight="850" fill="#38bdf8">RUN DEMO / TRACE SOURCE &gt; EQUATION &gt; IMPACT / INSPECT TESTS</text>
  <rect x="1" y="1" width="678" height="468" rx="27" fill="none" stroke="#29405c" stroke-opacity="0.75"/>
</svg>
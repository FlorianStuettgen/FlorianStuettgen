<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="720" viewBox="0 0 1440 720" role="img" aria-labelledby="title desc">
  <title id="title">EQ-Proof Control Room processional strip</title>
  <desc id="desc">Three views of the EQ-Proof Control Room: the operating surface, the blocked close gate, and the reconstructed evidence behind the decision.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#07100f"/><stop offset="1" stop-color="#0d1d1a"/></linearGradient>
    <linearGradient id="danger" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#431f22"/><stop offset="1" stop-color="#132522"/></linearGradient>
    <linearGradient id="mint" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#163d33"/><stop offset="1" stop-color="#10231f"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000" flood-opacity=".4"/></filter>
    <filter id="panelShadow"><feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity=".35"/></filter>
    <style>
      .ui{font-family:Inter,Segoe UI,Arial,sans-serif}.muted{fill:#8fa9a1}.bright{fill:#effaf6}.green{fill:#65f5c6}.red{fill:#ff8188}.amber{fill:#ffcc66}.label{font-size:15px;font-weight:700;letter-spacing:2px}.small{font-size:15px}.value{font-size:43px;font-weight:800;letter-spacing:-2px}.title{font-size:32px;font-weight:800}.hair{stroke:#29413b;stroke-width:1}.card{fill:#10211e;stroke:#29413b}.pill{fill:#132a25;stroke:#355149}.mono{font-family:Consolas,monospace}
    </style>
    <symbol id="controlRoom" viewBox="0 0 1600 980">
      <rect width="1600" height="980" fill="url(#bg)"/>
      <circle cx="130" cy="80" r="260" fill="#23896c" opacity=".09"/><circle cx="1450" cy="880" r="300" fill="#5c6eff" opacity=".06"/>
      <g class="ui" filter="url(#shadow)">
        <rect x="50" y="42" width="1500" height="896" rx="24" fill="#0b1715" stroke="#29413b"/>
        <rect x="50" y="42" width="1500" height="68" rx="24" fill="#0e1d1a"/><line x1="50" y1="110" x2="1550" y2="110" class="hair"/>
        <rect x="76" y="59" width="38" height="38" rx="11" fill="#17352d" stroke="#65f5c6" opacity=".9"/><text x="95" y="84" text-anchor="middle" class="green" font-size="17" font-weight="900">EQ</text>
        <text x="130" y="78" class="bright" font-size="20" font-weight="800">EQ-Proof</text><text x="130" y="96" class="muted" font-size="11" letter-spacing="2">CONTROL ROOM</text>
        <rect x="1268" y="61" width="250" height="34" rx="17" class="pill"/><circle cx="1290" cy="78" r="5" fill="#65f5c6"/><text x="1305" y="83" class="muted" font-size="13">LOCAL-FIRST · NO TELEMETRY</text>
        <text x="84" y="152" class="green label">DECISION COCKPIT</text><text x="84" y="190" class="bright title">Hyperscale monthly close</text>
        <rect x="1195" y="143" width="132" height="31" rx="9" class="pill"/><text x="1261" y="164" text-anchor="middle" class="muted small">schedule.xer</text>
        <rect x="1337" y="143" width="104" height="31" rx="9" class="pill"/><text x="1389" y="164" text-anchor="middle" class="muted small">cost.csv</text>
        <rect x="1451" y="143" width="67" height="31" rx="9" class="pill"/><text x="1484" y="164" text-anchor="middle" class="muted small">rules</text>
        <rect x="84" y="214" width="1432" height="164" rx="18" fill="url(#danger)" stroke="#6b3438"/>
        <text x="116" y="250" class="red label">EXECUTIVE CLOSE GATE</text><text x="116" y="308" class="red" font-size="50" font-weight="900" letter-spacing="-2">CLOSE BLOCKED</text>
        <text x="116" y="343" class="bright" font-size="18">Reported EAC is $11M below AC + ETC; the configured risk-adjusted position is $76M above reported EAC.</text>
        <circle cx="1085" cy="296" r="54" fill="#10211e" stroke="#65f5c6" stroke-width="8" stroke-dasharray="126 214" transform="rotate(-90 1085 296)"/><text x="1085" y="295" text-anchor="middle" class="bright" font-size="28" font-weight="800">37</text><text x="1085" y="316" text-anchor="middle" class="muted" font-size="11">assurance</text>
        <line x1="1180" y1="251" x2="1180" y2="340" class="hair"/><text x="1210" y="286" class="bright" font-size="31" font-weight="800">3</text><text x="1210" y="310" class="muted small">blockers</text>
        <line x1="1300" y1="251" x2="1300" y2="340" class="hair"/><text x="1330" y="286" class="bright" font-size="31" font-weight="800">5</text><text x="1330" y="310" class="muted small">exceptions</text>
        <line x1="1420" y1="251" x2="1420" y2="340" class="hair"/><text x="1450" y="286" class="bright" font-size="31" font-weight="800">6</text><text x="1450" y="310" class="muted small">records</text>
        <g>
          <rect x="84" y="398" width="346" height="130" rx="16" class="card"/><text x="108" y="429" class="muted label">REPORTED EAC</text><text x="108" y="484" class="bright value">$407M</text><text x="108" y="510" class="muted small">What the submitted close claims</text>
          <rect x="444" y="398" width="346" height="130" rx="16" class="card"/><text x="468" y="429" class="muted label">DEFENSIBLE EAC</text><text x="468" y="484" class="bright value">$418M</text><text x="468" y="510" class="muted small">Actual cost + remaining forecast</text>
          <rect x="804" y="398" width="346" height="130" rx="16" class="card"/><text x="828" y="429" class="amber label">DETERMINISTIC GAP</text><text x="828" y="484" class="amber value">$11M</text><text x="828" y="510" class="muted small">Governed AC + ETC minus reported EAC</text>
          <rect x="1164" y="398" width="352" height="130" rx="16" fill="url(#mint)" stroke="#367360"/><text x="1188" y="429" class="green label">RISK-ADJUSTED POSITION</text><text x="1188" y="484" class="green value">$483M</text><text x="1188" y="510" class="muted small">Declared change + configured risk uplift</text>
        </g>
        <rect x="84" y="548" width="1432" height="48" rx="12" fill="#0d1a18" stroke="#29413b"/>
        <rect x="90" y="554" width="340" height="36" rx="9" fill="#17342c"/><text x="260" y="578" text-anchor="middle" class="bright" font-size="15" font-weight="700">Explain the surprise</text>
        <text x="594" y="578" text-anchor="middle" class="muted" font-size="15">Evidence graph</text><text x="927" y="578" text-anchor="middle" class="muted" font-size="15">Exception command centre</text><text x="1325" y="578" text-anchor="middle" class="muted" font-size="15">Equation workbench</text>
        <rect x="84" y="616" width="842" height="284" rx="18" class="card"/><text x="110" y="650" class="green label">VARIANCE INTELLIGENCE</text><text x="110" y="681" class="bright" font-size="24" font-weight="800">Where the exposure comes from</text>
        <g transform="translate(110 708)">
          <rect width="790" height="52" rx="11" fill="#12251f" stroke="#315149"/><rect width="740" height="52" rx="11" fill="#17352d" opacity=".55"/><text x="16" y="23" class="bright" font-size="17" font-weight="800">MEP-200</text><text x="773" y="23" text-anchor="end" class="green" font-size="22" font-weight="800">$37M</text><text x="16" y="43" class="muted" font-size="12">forecast gap $7M · pending $12M · risk uplift $18M</text>
          <g transform="translate(0 64)"><rect width="790" height="52" rx="11" fill="#12251f" stroke="#315149"/><rect width="480" height="52" rx="11" fill="#17352d" opacity=".45"/><text x="16" y="23" class="bright" font-size="17" font-weight="800">CIV-100</text><text x="773" y="23" text-anchor="end" class="green" font-size="22" font-weight="800">$24M</text><text x="16" y="43" class="muted" font-size="12">forecast gap $4M · pending $8M · risk uplift $12M</text></g>
          <g transform="translate(0 128)"><rect width="790" height="52" rx="11" fill="#12251f" stroke="#315149"/><rect width="300" height="52" rx="11" fill="#17352d" opacity=".38"/><text x="16" y="23" class="bright" font-size="17" font-weight="800">COM-300</text><text x="773" y="23" text-anchor="end" class="green" font-size="22" font-weight="800">$15M</text><text x="16" y="43" class="muted" font-size="12">pending $6M · risk uplift $9M</text></g>
        </g>
        <rect x="944" y="616" width="572" height="284" rx="18" class="card"/><text x="970" y="650" class="green label">CLOSE RECONSTRUCTION</text><text x="970" y="681" class="bright" font-size="24" font-weight="800">Reported → defensible → risk-adjusted</text>
        <g class="small">
          <text x="972" y="730" class="muted">Submitted reported EAC</text><text x="1484" y="730" text-anchor="end" class="bright" font-weight="800">$407M</text><line x1="970" y1="742" x2="1485" y2="742" class="hair"/>
          <text x="972" y="779" class="muted">+ Deterministic forecast contradiction</text><text x="1484" y="779" text-anchor="end" class="amber" font-weight="800">$11M</text><line x1="970" y1="791" x2="1485" y2="791" class="hair"/>
          <text x="972" y="828" class="muted">+ Declared change and risk uplift</text><text x="1484" y="828" text-anchor="end" class="amber" font-weight="800">$65M</text><line x1="970" y1="840" x2="1485" y2="840" class="hair"/>
          <text x="972" y="875" class="green" font-weight="800">= Reconstructed risk-adjusted position</text><text x="1484" y="875" text-anchor="end" class="green" font-size="24" font-weight="900">$483M</text>
        </g>
      </g>
    </symbol>
  </defs>
  <rect width="1440" height="720" rx="24" fill="#07100f"/>
  <g filter="url(#panelShadow)">
    <svg x="0" y="0" width="1440" height="360" viewBox="0 120 1600 400" preserveAspectRatio="xMidYMid slice" overflow="hidden"><use href="#controlRoom" width="1600" height="980"/></svg>
    <rect x="0.5" y="0.5" width="1439" height="359" rx="18" fill="none" stroke="#29413b"/>
  </g>
  <g filter="url(#panelShadow)">
    <svg x="0" y="384" width="704" height="336" viewBox="70 205 1020 487" preserveAspectRatio="xMidYMid slice" overflow="hidden"><use href="#controlRoom" width="1600" height="980"/></svg>
    <rect x="0.5" y="384.5" width="703" height="335" rx="18" fill="none" stroke="#29413b"/>
  </g>
  <g filter="url(#panelShadow)">
    <svg x="736" y="384" width="704" height="336" viewBox="900 590 650 310" preserveAspectRatio="xMidYMid slice" overflow="hidden"><use href="#controlRoom" width="1600" height="980"/></svg>
    <rect x="736.5" y="384.5" width="703" height="335" rx="18" fill="none" stroke="#29413b"/>
  </g>
</svg>

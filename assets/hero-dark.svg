<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="610" viewBox="0 0 1400 610" role="img" aria-labelledby="title desc">
  <title id="title">Florian Stuettgen project controls operating system</title>
  <desc id="desc">Animated command-center hero connecting field reality, controls assurance, and executive decisions.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="1" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="hot" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#fb7185"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#29405c" stroke-opacity="0.28" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#000000" flood-opacity="0.20"/>
    </filter>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#38bdf8"/>
    </marker>
    <style>
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; }
      .mono { font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; }
      .title { fill: #f8fafc; font-weight: 800; letter-spacing: -1px; }
      .body { fill: #a9b7c9; }
      .muted { fill: #6f8197; }
      .label { fill: #38bdf8; font-size: 16px; font-weight: 800; letter-spacing: 2px; }
      .panel { fill: #0d1b2d; stroke: #29405c; stroke-width: 1.3; }
      .panel2 { fill: #101f34; stroke: #29405c; stroke-width: 1.2; }
      .flow { fill: none; stroke: #38bdf8; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; }
      .pulse { transform-box: fill-box; transform-origin: center; animation: pulse 2.8s ease-in-out infinite; }
      .float { animation: float 5s ease-in-out infinite; }
      .scan { animation: scan 7s linear infinite; }
      @keyframes pulse { 0%,100% { opacity:.35; transform:scale(.88); } 50% { opacity:1; transform:scale(1.12); } }
      @keyframes float { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-5px); } }
      @keyframes scan { 0% { transform:translateX(-180px); opacity:0; } 12% { opacity:.5; } 88% { opacity:.5; } 100% { transform:translateX(1580px); opacity:0; } }
      @media (prefers-reduced-motion: reduce) { .pulse,.float,.scan { animation:none !important; } .motion { display:none; } }
    </style>
  </defs>
  <rect width="1400" height="610" rx="28" fill="url(#bg)"/>
  <rect width="1400" height="610" rx="28" fill="url(#grid)" opacity="0.36"/>
  <circle cx="1220" cy="80" r="210" fill="url(#accent)" opacity="0.07"/>
<circle cx="1270" cy="510" r="240" fill="url(#hot)" opacity="0.045"/>
<rect class="scan motion" x="-180" y="0" width="120" height="610" fill="url(#accent)" opacity="0.12" transform="skewX(-18)"/>
<text x="72" y="68" font-size="16" class="label mono" text-anchor="start" font-weight="800">PROJECT CONTROL / OPERATING SYSTEM</text>
<text x="72" y="138" font-size="55" class="title sans" text-anchor="start" font-weight="850">FLORIAN STUETTGEN</text>
<text x="72" y="188" font-size="31" class="title sans" text-anchor="start" font-weight="760">I engineer the decision layer between</text>
<text x="72" y="230" font-size="31" class="title sans" text-anchor="start" font-weight="760">field reality and executive action.</text>
<text x="72" y="294" font-size="18" class="body sans" text-anchor="start">Project controls • data engineering • capital-program delivery</text>
<text x="72" y="325" font-size="18" class="body sans" text-anchor="start">Cost, schedule, risk, change, procurement, progress and evidence</text>
<rect x="72" y="342" width="198" height="34" rx="17" fill="#fbbf24" fill-opacity="0.12" stroke="#fbbf24" stroke-opacity="0.55"/><text x="171" y="364" font-size="13" class="mono" text-anchor="middle" font-weight="700" fill="#fbbf24">EDMONTON / ALBERTA</text>
<rect x="284" y="342" width="178" height="34" rx="17" fill="#a78bfa" fill-opacity="0.12" stroke="#a78bfa" stroke-opacity="0.55"/><text x="373" y="364" font-size="13" class="mono" text-anchor="middle" font-weight="700" fill="#a78bfa">CAPITAL PROGRAMS</text>
<rect x="476" y="342" width="230" height="34" rx="17" fill="#38bdf8" fill-opacity="0.12" stroke="#38bdf8" stroke-opacity="0.55"/><text x="591" y="364" font-size="13" class="mono" text-anchor="middle" font-weight="700" fill="#38bdf8">P6 / SQL / PYTHON / BI</text>
<rect x="72" y="395" width="235" height="132" rx="16" class="panel2"/>
<rect x="72" y="395" width="235" height="4" rx="2" fill="#38bdf8"/>
<text x="90" y="436" font-size="23" class="title sans" text-anchor="start" font-weight="850" fill="#38bdf8">10+</text>
<text x="90" y="470" font-size="12" class="body mono" text-anchor="start" font-weight="750">YEARS ACROSS</text>
<text x="90" y="495" font-size="11" class="muted mono" text-anchor="start" font-weight="650">FIELD + CAPITAL PROGRAMS</text>
<rect x="322" y="395" width="235" height="132" rx="16" class="panel2"/>
<rect x="322" y="395" width="235" height="4" rx="2" fill="#34d399"/>
<text x="340" y="436" font-size="23" class="title sans" text-anchor="start" font-weight="850" fill="#34d399">FIELD→DATA</text>
<text x="340" y="470" font-size="12" class="body mono" text-anchor="start" font-weight="750">CAREER ARC</text>
<text x="340" y="495" font-size="11" class="muted mono" text-anchor="start" font-weight="650">JOURNEYMAN TO SYSTEMS</text>
<rect x="572" y="395" width="235" height="132" rx="16" class="panel2"/>
<rect x="572" y="395" width="235" height="4" rx="2" fill="#a78bfa"/>
<text x="590" y="436" font-size="23" class="title sans" text-anchor="start" font-weight="850" fill="#a78bfa">2×MBA + MIT</text>
<text x="590" y="470" font-size="12" class="body mono" text-anchor="start" font-weight="750">BUSINESS + ANALYTICS</text>
<text x="590" y="495" font-size="11" class="muted mono" text-anchor="start" font-weight="650">IMPLEMENTATION DISCIPLINE</text>
<rect x="840" y="60" width="500" height="467" rx="24" class="panel" filter="url(#shadow)"/>
<text x="866" y="96" font-size="15" class="label mono" text-anchor="start" font-weight="800">DECISION ASSURANCE PIPELINE</text>
<rect x="868" y="128" width="112" height="43" rx="12" class="panel2"/>
<circle cx="888" cy="149.5" r="6" fill="#34d399" class="pulse"/>
<text x="905" y="155" font-size="13" class="mono" text-anchor="start" font-weight="800" fill="#34d399">FIELD</text>
<path d="M980 149 H1036" class="flow" opacity="0.65"/>
<rect x="868" y="178" width="112" height="43" rx="12" class="panel2"/>
<circle cx="888" cy="199.5" r="6" fill="#38bdf8" class="pulse"/>
<text x="905" y="205" font-size="13" class="mono" text-anchor="start" font-weight="800" fill="#38bdf8">P6</text>
<path d="M980 199 H1036" class="flow" opacity="0.65"/>
<rect x="868" y="228" width="112" height="43" rx="12" class="panel2"/>
<circle cx="888" cy="249.5" r="6" fill="#fbbf24" class="pulse"/>
<text x="905" y="255" font-size="13" class="mono" text-anchor="start" font-weight="800" fill="#fbbf24">COST</text>
<path d="M980 249 H1036" class="flow" opacity="0.65"/>
<rect x="868" y="278" width="112" height="43" rx="12" class="panel2"/>
<circle cx="888" cy="299.5" r="6" fill="#fb7185" class="pulse"/>
<text x="905" y="305" font-size="13" class="mono" text-anchor="start" font-weight="800" fill="#fb7185">RISK</text>
<path d="M980 299 H1036" class="flow" opacity="0.65"/>
<rect x="1036" y="142" width="150" height="174" rx="22" class="panel2"/>
<circle cx="1111" cy="198" r="34" fill="none" stroke="#38bdf8" stroke-width="7" stroke-dasharray="56 20" opacity="0.85"><animateTransform attributeName="transform" type="rotate" from="0 1111 198" to="360 1111 198" dur="8s" repeatCount="indefinite"/></circle>
<circle cx="1111" cy="198" r="16" fill="#34d399" fill-opacity="0.18" stroke="#34d399"/>
<text x="1111" y="258" font-size="14" class="title mono" text-anchor="middle" font-weight="850">ASSURANCE</text>
<text x="1111" y="280" font-size="11" class="muted mono" text-anchor="middle" font-weight="700">RULES • LINEAGE</text>
<path d="M1186 229 H1237" class="flow" marker-end="url(#arrow)"/>
<rect x="1240" y="168" width="72" height="122" rx="18" class="panel2"/>
<text x="1276" y="208" font-size="24" class="title mono" text-anchor="middle" font-weight="900" fill="#34d399">GO</text>
<text x="1276" y="238" font-size="11" class="muted mono" text-anchor="middle" font-weight="700">NO-GO</text>
<text x="1276" y="263" font-size="11" class="muted mono" text-anchor="middle" font-weight="700">WHY</text>
<rect x="862" y="384" width="456" height="119" rx="18" class="panel2"/>
<text x="886" y="418" font-size="13" class="label mono" text-anchor="start" font-weight="800">SYSTEM STATE</text>
<circle cx="890" cy="454" r="7" fill="#34d399" class="pulse" filter="url(#glow)"/>
<text x="910" y="460" font-size="12" class="title mono" text-anchor="start" font-weight="800">TRACEABLE, AUDIT-READY DECISION SYSTEMS</text>
<text x="886" y="487" font-size="11" class="muted mono" text-anchor="start" font-weight="700">INPUT / CONTROL / EXCEPTION / DECISION / EVIDENCE</text>
<text x="70" y="575" font-size="13" class="mono" text-anchor="start" font-weight="800" fill="#6f8197">PROJECT CONTROLS DISCIPLINE  /  DATA-ENGINEERING RIGOR  /  FIELD-BUILT JUDGMENT</text>
  <rect x="1" y="1" width="1398" height="608" rx="27" fill="none" stroke="#29405c" stroke-opacity="0.75"/>
</svg>
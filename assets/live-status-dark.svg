<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="330" viewBox="0 0 1400 330" role="img" aria-labelledby="title desc">
  <title id="title">Live profile system telemetry</title>
  <desc id="desc">Repository telemetry for EQ-Proof and SOC_Replay.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#07111f"/><stop offset="1" stop-color="#0a1628"/></linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse"><path d="M32 0H0V32" fill="none" stroke="#29405c" stroke-opacity="0.28" stroke-width="1"/></pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#000000" flood-opacity="0.20"/></filter>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="7" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <style>
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; }
      .mono { font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; }
      .title { fill: #f8fafc; font-weight: 800; letter-spacing: -1px; }
      .body { fill: #a9b7c9; }
      .muted { fill: #6f8197; }
      .label { fill: #38bdf8; font-size: 16px; font-weight: 800; letter-spacing: 2px; }
      .panel { fill: #0d1b2d; stroke: #29405c; stroke-width: 1.3; }
      .panel2 { fill: #101f34; stroke: #29405c; stroke-width: 1.2; }
      .pulse { transform-box: fill-box; transform-origin: center; animation: pulse 2.8s ease-in-out infinite; }
      @keyframes pulse { 0%,100% { opacity:.35; transform:scale(.88); } 50% { opacity:1; transform:scale(1.12); } }
      @media (prefers-reduced-motion: reduce) { .pulse { animation:none !important; } }
    </style>
  </defs>
  <rect width="1400" height="330" rx="28" fill="url(#bg)"/>
  <rect width="1400" height="330" rx="28" fill="url(#grid)" opacity="0.36"/>
  <rect x="28" y="28" width="1344" height="274" rx="24" class="panel" filter="url(#shadow)"/>
  <text x="58" y="69" font-size="15" class="label mono" font-weight="850">SYSTEM TELEMETRY</text>
  <text x="1322" y="69" font-size="12" class="muted mono" text-anchor="end" font-weight="700">VERIFIED 2026-07-14</text>
  <text x="58" y="106" font-size="19" class="title sans" font-weight="760">Meaningful proof—not profile-view counters.</text>
  <rect x="58" y="132" width="618" height="132" rx="18" class="panel2"/>
  <rect x="58" y="132" width="6" height="132" rx="3" fill="#38bdf8"/>
  <circle cx="90" cy="161" r="7" fill="#38bdf8" class="pulse" filter="url(#glow)"/>
  <text x="110" y="167" font-size="18" class="title mono" font-weight="900">EQ-PROOF CONTROL ROOM</text>
  <text x="110" y="190" font-size="11" class="muted mono" font-weight="700">PROJECT-CONTROLS ASSURANCE</text>
  <rect x="448" y="146" width="128" height="34" rx="17" fill="#38bdf8" fill-opacity="0.12" stroke="#38bdf8" stroke-opacity="0.55"/><text x="512" y="168" font-size="13" class="mono" text-anchor="middle" font-weight="700" fill="#38bdf8">CI ACTIVE</text>
  <text x="88" y="228" font-size="12" class="body mono" font-weight="700">$76M HIDDEN EXPOSURE RECONSTRUCTED</text>
  <text x="88" y="250" font-size="12" class="body mono" font-weight="700">92% COVERAGE · CODEQL · REBUILDABLE DEMO</text>
  <rect x="708" y="132" width="618" height="132" rx="18" class="panel2"/>
  <rect x="708" y="132" width="6" height="132" rx="3" fill="#34d399"/>
  <circle cx="740" cy="161" r="7" fill="#34d399" class="pulse" filter="url(#glow)"/>
  <text x="760" y="167" font-size="18" class="title mono" font-weight="900">SOC_REPLAY</text>
  <text x="760" y="190" font-size="11" class="muted mono" font-weight="700">DETERMINISTIC EVIDENCE ENGINE</text>
  <rect x="1098" y="146" width="128" height="34" rx="17" fill="#34d399" fill-opacity="0.12" stroke="#34d399" stroke-opacity="0.55"/><text x="1162" y="168" font-size="13" class="mono" text-anchor="middle" font-weight="700" fill="#34d399">v3.1</text>
  <text x="738" y="228" font-size="12" class="body mono" font-weight="700">42 TESTS · 93% BRANCH COVERAGE</text>
  <text x="738" y="250" font-size="12" class="body mono" font-weight="700">SCHEMA VALIDATION · LEDGER · BUNDLE IDENTITY</text>
  <rect x="1" y="1" width="1398" height="328" rx="27" fill="none" stroke="#29405c" stroke-opacity="0.75"/>
</svg>
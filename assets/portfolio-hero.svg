<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320" role="img" aria-labelledby="title description">
  <title id="title">Florian Stuettgen — Project Controls and Data Engineering</title>
  <desc id="description">A professional portfolio banner showing project data moving from source systems through governed controls into defensible decisions.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.58" stop-color="#0b1d33"/>
      <stop offset="1" stop-color="#102a43"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f4b942"/>
      <stop offset="1" stop-color="#4fd1c5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000814" flood-opacity="0.38"/>
    </filter>
  </defs>

  <rect width="1280" height="320" rx="24" fill="url(#background)"/>
  <path d="M0 263 C230 218 370 316 610 261 S1000 201 1280 249 V320 H0 Z" fill="#4fd1c5" opacity="0.055"/>
  <circle cx="1185" cy="52" r="118" fill="#f4b942" opacity="0.035"/>
  <rect x="62" y="58" width="72" height="5" rx="2.5" fill="url(#accent)"/>

  <text x="62" y="104" fill="#f4b942" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="3.4">FLORIAN STUETTGEN</text>
  <text x="62" y="151" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif" font-size="37" font-weight="700">PROJECT CONTROLS</text>
  <text x="62" y="194" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif" font-size="37" font-weight="700">× DATA ENGINEERING</text>
  <text x="62" y="232" fill="#b8c7d9" font-family="Segoe UI, Arial, sans-serif" font-size="18">Systems for decisions that have to survive review.</text>
  <text x="62" y="270" fill="#7891aa" font-family="Segoe UI, Arial, sans-serif" font-size="14" letter-spacing="1.2">P6  •  COST  •  CHANGE  •  RISK  •  SQL  •  PYTHON  •  LINEAGE  •  EVIDENCE</text>

  <g filter="url(#shadow)" font-family="Segoe UI, Arial, sans-serif">
    <rect x="690" y="68" width="146" height="184" rx="16" fill="#0d2239" stroke="#24445f"/>
    <text x="713" y="99" fill="#7891aa" font-size="12" font-weight="700" letter-spacing="1.6">SOURCE</text>
    <rect x="713" y="118" width="100" height="28" rx="7" fill="#132f4c"/>
    <text x="763" y="137" fill="#dce7f2" font-size="12" text-anchor="middle">P6 / XER</text>
    <rect x="713" y="156" width="100" height="28" rx="7" fill="#132f4c"/>
    <text x="763" y="175" fill="#dce7f2" font-size="12" text-anchor="middle">COST</text>
    <rect x="713" y="194" width="100" height="28" rx="7" fill="#132f4c"/>
    <text x="763" y="213" fill="#dce7f2" font-size="12" text-anchor="middle">CHANGE / RISK</text>

    <path d="M846 160 H882" stroke="#4fd1c5" stroke-width="2"/>
    <path d="M875 154 L882 160 L875 166" fill="none" stroke="#4fd1c5" stroke-width="2"/>

    <rect x="892" y="68" width="146" height="184" rx="16" fill="#102a43" stroke="#4fd1c5" stroke-opacity="0.62"/>
    <text x="915" y="99" fill="#4fd1c5" font-size="12" font-weight="700" letter-spacing="1.6">CONTROL</text>
    <text x="915" y="132" fill="#e6fffb" font-size="13">Contracts</text>
    <line x1="915" y1="143" x2="1015" y2="143" stroke="#24445f"/>
    <text x="915" y="169" fill="#e6fffb" font-size="13">Lineage</text>
    <line x1="915" y1="180" x2="1015" y2="180" stroke="#24445f"/>
    <text x="915" y="206" fill="#e6fffb" font-size="13">Quality gates</text>
    <circle cx="1014" cy="202" r="5" fill="#4fd1c5"/>

    <path d="M1048 160 H1084" stroke="#f4b942" stroke-width="2"/>
    <path d="M1077 154 L1084 160 L1077 166" fill="none" stroke="#f4b942" stroke-width="2"/>

    <rect x="1094" y="68" width="126" height="184" rx="16" fill="#2c2617" stroke="#f4b942" stroke-opacity="0.72"/>
    <text x="1115" y="99" fill="#f4b942" font-size="12" font-weight="700" letter-spacing="1.6">DECISION</text>
    <text x="1115" y="136" fill="#fff7dc" font-size="13">Forecast</text>
    <text x="1115" y="171" fill="#fff7dc" font-size="13">Correction</text>
    <text x="1115" y="206" fill="#fff7dc" font-size="13">Evidence</text>
    <path d="M1115 222 H1197" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"/>
  </g>
</svg>

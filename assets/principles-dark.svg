<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="410" viewBox="0 0 1400 410" role="img" aria-labelledby="title desc"><title id="title">Operating principles terminal</title><desc id="desc">Terminal-style principles for transparent, executable, reproducible decision systems.</desc><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#07111f"/><stop offset="1" stop-color="#0a1628"/></linearGradient><pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse"><path d="M32 0H0V32" fill="none" stroke="#29405c" stroke-opacity=".28"/></pattern><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#000" flood-opacity=".2"/></filter><style>.mono{font-family:Consolas,"Liberation Mono",Menlo,monospace}.title{fill:#f8fafc;font-weight:800;letter-spacing:-1px}.muted{fill:#6f8197}.panel{fill:#0d1b2d;stroke:#29405c;stroke-width:1.3}.panel2{fill:#101f34;stroke:#29405c;stroke-width:1.2}.pulse{transform-box:fill-box;transform-origin:center;animation:pulse 1.3s steps(1,end) infinite}@keyframes pulse{0%,49%{opacity:1}50%,100%{opacity:.15}}@media(prefers-reduced-motion:reduce){.pulse{animation:none}}</style></defs><rect width="1400" height="410" rx="28" fill="url(#bg)"/><rect width="1400" height="410" rx="28" fill="url(#grid)" opacity=".36"/><rect x="32" y="32" width="1336" height="346" rx="24" class="panel" filter="url(#shadow)"/><rect x="56" y="58" width="1288" height="54" rx="14" class="panel2"/><circle cx="82" cy="85" r="7" fill="#fb7185"/><circle cx="106" cy="85" r="7" fill="#fbbf24"/><circle cx="130" cy="85" r="7" fill="#34d399"/><text x="158" y="91" font-size="13" class="muted mono" font-weight="700">florian@decision-layer:~/operating-principles</text><g class="mono"><text x="76" y="154" font-size="18" font-weight="900" fill="#fb7185">&gt;</text><text x="106" y="154" font-size="20" class="title" font-weight="850">DO NOT MAKE UNCERTAINTY PRETTIER.</text><text x="76" y="196" font-size="18" font-weight="900" fill="#38bdf8">&gt;</text><text x="106" y="196" font-size="20" class="title" font-weight="850">MAKE THE SOURCE LOGIC VISIBLE.</text><text x="76" y="238" font-size="18" font-weight="900" fill="#34d399">&gt;</text><text x="106" y="238" font-size="20" class="title" font-weight="850">MAKE THE CONTROLS EXECUTABLE.</text><text x="76" y="280" font-size="18" font-weight="900" fill="#fbbf24">&gt;</text><text x="106" y="280" font-size="20" class="title" font-weight="850">MAKE EXCEPTIONS IMPOSSIBLE TO IGNORE.</text><text x="76" y="322" font-size="18" font-weight="900" fill="#a78bfa">&gt;</text><text x="106" y="322" font-size="20" class="title" font-weight="850">MAKE THE DECISION REPRODUCIBLE.</text></g><rect x="106" y="349" width="13" height="22" fill="#38bdf8" opacity=".85" class="pulse"/><text x="1318" y="349" font-size="11" class="muted mono" text-anchor="end" font-weight="800">FIELD-BUILT JUDGMENT / CONTROLS DISCIPLINE / DATA-ENGINEERING RIGOR</text><rect x="1" y="1" width="1398" height="408" rx="27" fill="none" stroke="#29405c" stroke-opacity=".75"/></svg>
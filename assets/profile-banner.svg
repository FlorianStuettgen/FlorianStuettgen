<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Florian Stuettgen — Project Controls and Data Systems</title>
  <desc id="desc">Professional banner emphasizing project controls, data engineering, and field execution.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="55%" stop-color="#111c31"/>
      <stop offset="100%" stop-color="#0d2630"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.045" stroke-width="1"/>
    </pattern>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
  </defs>

  <rect width="1200" height="360" rx="24" fill="url(#background)"/>
  <rect width="1200" height="360" rx="24" fill="url(#grid)"/>

  <circle cx="1005" cy="85" r="130" fill="#38bdf8" fill-opacity="0.10" filter="url(#softGlow)"/>
  <circle cx="1090" cy="260" r="150" fill="#2dd4bf" fill-opacity="0.08" filter="url(#softGlow)"/>

  <g transform="translate(70 70)">
    <rect x="0" y="0" width="82" height="8" rx="4" fill="url(#accent)"/>
    <text x="0" y="70" fill="#f8fafc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="52" font-weight="700" letter-spacing="-1.5">Florian Stuettgen</text>
    <text x="0" y="116" fill="#a7f3d0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="23" font-weight="600" letter-spacing="1.4">PROJECT CONTROLS × DATA SYSTEMS × FIELD EXECUTION</text>
    <text x="0" y="166" fill="#cbd5e1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22">Building traceable decision systems for complex capital programs.</text>
  </g>

  <g transform="translate(865 92)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M45 18 H178 V72 H235" stroke="#38bdf8" stroke-opacity="0.78" stroke-width="3"/>
    <path d="M18 134 H110 V204 H242" stroke="#2dd4bf" stroke-opacity="0.78" stroke-width="3"/>
    <path d="M82 78 V134" stroke="#94a3b8" stroke-opacity="0.55" stroke-width="3"/>
    <circle cx="45" cy="18" r="9" fill="#38bdf8" stroke="none"/>
    <circle cx="178" cy="72" r="9" fill="#7dd3fc" stroke="none"/>
    <circle cx="235" cy="72" r="9" fill="#2dd4bf" stroke="none"/>
    <circle cx="18" cy="134" r="9" fill="#2dd4bf" stroke="none"/>
    <circle cx="110" cy="204" r="9" fill="#5eead4" stroke="none"/>
    <circle cx="242" cy="204" r="9" fill="#38bdf8" stroke="none"/>
    <circle cx="82" cy="106" r="8" fill="#cbd5e1" stroke="none"/>
  </g>

  <rect x="1" y="1" width="1198" height="358" rx="23" fill="none" stroke="#ffffff" stroke-opacity="0.10"/>
</svg>

  <g transform="translate(58 500)">
    <rect width="1084" height="74" rx="16" fill="#0e1a2a" stroke="#26364d"/>
    <text x="26" y="30" fill="#7dd3fc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="700" letter-spacing="1.2">CHANGE RADIUS</text>
    <text x="26" y="53" fill="#cbd5e1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16">Trace the edit through structure, lineage, and downstream surfaces before touching the model.</text>

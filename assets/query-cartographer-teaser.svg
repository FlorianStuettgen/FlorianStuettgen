<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Query Cartographer lineage and change-radius teaser</title>
  <desc id="desc">A restrained dependency map showing source tables, transformations, a proposed query edit, and the downstream paths affected by that change.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#08111f"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" fill="none" stroke="#94a3b8" stroke-opacity="0.07"/>
    </pattern>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" rx="24" fill="url(#bg)"/>
  <rect width="1200" height="630" rx="24" fill="url(#grid)"/>

  <text x="58" y="70" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="30" font-weight="750">QUERY CARTOGRAPHER</text>
  <text x="58" y="103" fill="#94a3b8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">Lineage before modification</text>
  <rect x="956" y="50" width="184" height="34" rx="17" fill="#142033" stroke="#334155"/>
  <text x="1048" y="72" text-anchor="middle" fill="#cbd5e1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="700" letter-spacing="1.4">PRIVATE DEVELOPMENT</text>

  <g stroke="#475569" stroke-width="2" fill="none" opacity="0.72">
    <path d="M194 224 C276 224 292 196 370 196"/>
    <path d="M194 314 C276 314 292 278 370 278"/>
    <path d="M194 404 C276 404 292 360 370 360"/>
    <path d="M528 196 C610 196 626 250 706 250"/>
    <path d="M528 278 C610 278 626 250 706 250"/>
    <path d="M528 360 C610 360 626 332 706 332"/>
    <path d="M864 250 C936 250 948 218 1014 218"/>
    <path d="M864 250 C936 250 948 308 1014 308"/>
    <path d="M864 332 C936 332 948 398 1014 398"/>
  </g>

  <g stroke="#38bdf8" stroke-width="4" fill="none" filter="url(#glow)">

<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">Real Estate Decision Desk working interface preview</title>
  <desc id="desc">A synthetic-data preview of the implemented private Google Apps Script web application, showing decision metrics, ranked homes, status mix, recent activity, and attention items.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#13231e" flood-opacity="0.18"/></filter>
    <style>
      .ui{font-family:Inter,Segoe UI,Arial,sans-serif}.serif{font-family:Georgia,Times New Roman,serif}.ink{fill:#17211e}.muted{fill:#66736f}.green{fill:#173c35}.green2{fill:#2f6257}.paper{fill:#fffefa}.line{stroke:#dce2de}.small{font-size:14px}.tiny{font-size:11px}.label{font-size:12px;font-weight:800;letter-spacing:1.4px}.value{font-size:30px;font-weight:500}.heading{font-size:25px;font-weight:500}.strong{font-weight:750}
    </style>
  </defs>

  <rect width="1400" height="820" rx="24" fill="#e9ede9"/>
  <rect x="26" y="22" width="1348" height="776" rx="20" fill="#fffefa" filter="url(#shadow)"/>

  <rect x="26" y="22" width="1348" height="42" rx="20" fill="#f2f4f2"/>
  <circle cx="54" cy="43" r="6" fill="#d47b72"/><circle cx="74" cy="43" r="6" fill="#d7ad62"/><circle cx="94" cy="43" r="6" fill="#7daf8d"/>
  <rect x="478" y="32" width="470" height="22" rx="11" fill="#ffffff" stroke="#dce2de"/>
  <text x="713" y="47" text-anchor="middle" class="ui muted tiny">Private Decision Desk · synthetic data</text>

  <rect x="26" y="64" width="230" height="734" fill="#173c35"/>
  <g class="ui">
    <rect x="54" y="96" width="44" height="44" rx="14" fill="none" stroke="#f0c98f"/>
    <text x="76" y="124" text-anchor="middle" fill="#f0c98f" font-size="15" font-weight="800">ED</text>
    <text x="112" y="112" fill="#ffffff" class="serif" font-size="18">Decision Desk</text>
    <text x="112" y="133" fill="#b7cbc5" class="tiny">Private home search</text>

    <g font-size="14" fill="#d9e5e1">
      <rect x="44" y="176" width="188" height="44" rx="10" fill="#2b574e"/>
      <text x="66" y="203" fill="#ffffff" font-weight="700">Overview</text>
      <text x="66" y="251">Browse</text>
      <text x="66" y="299">Listings</text>
      <text x="66" y="347">Compare</text>
      <rect x="193" y="327" width="25" height="22" rx="11" fill="#ffffff"/><text x="205.5" y="342" text-anchor="middle" fill="#173c35" font-size="11" font-weight="800">3</text>
      <text x="66" y="395">Archive</text>
      <text x="66" y="443">Settings</text>
    </g>

    <line x1="52" y1="724" x2="230" y2="724" stroke="#41665d"/>
    <text x="54" y="754" fill="#ffffff" font-size="13" font-weight="700">Household account</text>
    <text x="54" y="775" fill="#b7cbc5" class="tiny">Authorized user</text>
  </g>

  <rect x="256" y="64" width="1118" height="104" fill="#f7f4ed"/>
  <line x1="256" y1="168" x2="1374" y2="168" stroke="#dce2de"/>
  <g class="ui">
    <text x="302" y="100" class="green2 label">EDMONTON HOME SEARCH</text>
    <text x="302" y="140" class="serif ink" font-size="34">Decision overview</text>
    <rect x="1212" y="96" width="124" height="44" rx="10" fill="#173c35"/>
    <text x="1274" y="123" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="750">Add listing</text>
  </g>

  <g class="ui">
    <g transform="translate(302 198)">
      <rect width="184" height="92" rx="14" class="paper line"/>
      <text x="18" y="39" class="serif green value">8</text><text x="18" y="68" class="muted small">All listings</text>
    </g>
    <g transform="translate(500 198)">
      <rect width="184" height="92" rx="14" class="paper line"/>
      <text x="18" y="39" class="serif green value">5</text><text x="18" y="68" class="muted small">Active</text>
    </g>
    <g transform="translate(698 198)">
      <rect width="184" height="92" rx="14" class="paper line"/>
      <text x="18" y="39" class="serif green value">3</text><text x="18" y="68" class="muted small">Shortlisted</text>
    </g>
    <g transform="translate(896 198)">
      <rect width="184" height="92" rx="14" class="paper line"/>
      <text x="18" y="39" class="serif green value">81%</text><text x="18" y="68" class="muted small">Average joint score</text>
    </g>
    <g transform="translate(1094 198)">
      <rect width="184" height="92" rx="14" class="paper line"/>
      <text x="18" y="39" class="serif green value">72%</text><text x="18" y="68" class="muted small">Score completeness</text>
    </g>
  </g>

  <g class="ui">
    <rect x="302" y="316" width="626" height="222" rx="16" class="paper line"/>
    <text x="326" y="354" class="serif ink heading">Highest-ranked eligible homes</text>
    <rect x="826" y="330" width="76" height="34" rx="9" fill="#fffefa" stroke="#dce2de"/><text x="864" y="351" text-anchor="middle" class="ink tiny strong">Compare</text>

    <line x1="326" y1="388" x2="904" y2="388" stroke="#e6ebe8"/>
    <text x="326" y="417" class="ink small strong">Ritchie candidate</text><text x="326" y="438" class="muted tiny">Detached · $498,000</text><text x="886" y="427" text-anchor="end" class="green serif" font-size="24">86%</text>
    <line x1="326" y1="458" x2="904" y2="458" stroke="#e6ebe8"/>
    <text x="326" y="487" class="ink small strong">Bonnie Doon candidate</text><text x="326" y="508" class="muted tiny">Detached · $524,000</text><text x="886" y="497" text-anchor="end" class="green serif" font-size="24">82%</text>

    <rect x="950" y="316" width="328" height="222" rx="16" class="paper line"/>
    <text x="974" y="354" class="serif ink heading">Status mix</text>
    <text x="974" y="401" class="muted small">Shortlisted</text><rect x="1065" y="390" width="160" height="10" rx="5" fill="#edf1ef"/><rect x="1065" y="390" width="128" height="10" rx="5" fill="#2f6257"/><text x="1252" y="401" class="ink tiny strong">3</text>
    <text x="974" y="444" class="muted small">Researching</text><rect x="1065" y="433" width="160" height="10" rx="5" fill="#edf1ef"/><rect x="1065" y="433" width="86" height="10" rx="5" fill="#2f6257"/><text x="1252" y="444" class="ink tiny strong">2</text>
    <text x="974" y="487" class="muted small">Archived</text><rect x="1065" y="476" width="160" height="10" rx="5" fill="#edf1ef"/><rect x="1065" y="476" width="128" height="10" rx="5" fill="#c88735"/><text x="1252" y="487" class="ink tiny strong">3</text>
  </g>

  <g class="ui">
    <rect x="302" y="562" width="626" height="188" rx="16" class="paper line"/>
    <text x="326" y="600" class="serif ink heading">Recent listing activity</text>
    <line x1="326" y1="624" x2="904" y2="624" stroke="#e6ebe8"/>
    <text x="326" y="652" class="ink small strong">Candidate imported for review</text><text x="326" y="673" class="muted tiny">Facts preserved · scoring incomplete</text><text x="886" y="660" text-anchor="end" class="green2 tiny strong">68% facts</text>
    <line x1="326" y1="694" x2="904" y2="694" stroke="#e6ebe8"/>
    <text x="326" y="722" class="ink small strong">Joint score updated</text><text x="326" y="743" class="muted tiny">Two independent scorecards reconciled</text><text x="886" y="730" text-anchor="end" class="green2 tiny strong">82%</text>

    <rect x="950" y="562" width="328" height="188" rx="16" class="paper line"/>
    <text x="974" y="600" class="serif ink heading">Attention needed</text>
    <rect x="974" y="626" width="132" height="96" rx="12" fill="#f7f4ed" stroke="#e3e5df"/>
    <text x="990" y="663" class="serif green" font-size="27">4</text><text x="990" y="690" class="muted tiny">Missing critical facts</text>
    <rect x="1122" y="626" width="132" height="96" rx="12" fill="#f7f4ed" stroke="#e3e5df"/>
    <text x="1138" y="663" class="serif" fill="#9b3b31" font-size="27">1</text><text x="1138" y="690" class="muted tiny">Deal-breaker flag</text>
  </g>

  <text x="302" y="780" class="ui muted tiny">Working private build · synthetic interface data · production details withheld</text>
</svg>
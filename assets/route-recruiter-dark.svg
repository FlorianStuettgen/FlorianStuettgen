<svg xmlns="http://www.w3.org/2000/svg" width="430" height="250" viewBox="0 0 430 250" role="img" aria-labelledby="title desc">
  <title id="title">RECRUITER route</title>
  <desc id="desc">Audience navigation card for recruiter visitors.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="1" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="hot" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#fb7185"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#29405c" stroke-opacity="0.28" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#000000" flood-opacity="0.20"/>
    </filter>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#38bdf8"/>
    </marker>
    <style>
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; }
      .mono { font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; }
      .title { fill: #f8fafc; font-weight: 800; letter-spacing: -1px; }
      .body { fill: #a9b7c9; }
      .muted { fill: #6f8197; }
      .label { fill: #38bdf8; font-size: 16px; font-weight: 800; letter-spacing: 2px; }
      .panel { fill: #0d1b2d; stroke: #29405c; stroke-width: 1.3; }
      .panel2 { fill: #101f34; stroke: #29405c; stroke-width: 1.2; }
      .flow { fill: none; stroke: #38bdf8; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; }
      .pulse { transform-box: fill-box; transform-origin: center; animation: pulse 2.8s ease-in-out infinite; }
      .float { animation: float 5s ease-in-out infinite; }
      .scan { animation: scan 7s linear infinite; }
      @keyframes pulse { 0%,100% { opacity:.35; transform:scale(.88); } 50% { opacity:1; transform:scale(1.12); } }
      @keyframes float { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-5px); } }
      @keyframes scan { 0% { transform:translateX(-180px); opacity:0; } 12% { opacity:.5; } 88% { opacity:.5; } 100% { transform:translateX(610px); opacity:0; } }
      @media (prefers-reduced-motion: reduce) { .pulse,.float,.scan { animation:none !important; } .motion { display:none; } }
    </style>
  </defs>
  <rect width="430" height="250" rx="28" fill="url(#bg)"/>
  <rect width="430" height="250" rx="28" fill="url(#grid)" opacity="0.36"/>
  <rect x="16" y="16" width="398" height="218" rx="22" class="panel" filter="url(#shadow)"/>
<rect x="16" y="16" width="398" height="5" rx="2.5" fill="#38bdf8"/>
<text x="38" y="53" font-size="14" class="mono" text-anchor="start" font-weight="850" fill="#38bdf8">01</text>
<text x="78" y="53" font-size="14" class="label mono" text-anchor="start" font-weight="850" fill="#38bdf8">RECRUITER</text>
<g transform="translate(317 34)" fill="none" stroke="#38bdf8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.92"><path d="M28 27a12 12 0 1 0 24 0 12 12 0 1 0-24 0Zm-7 40c0-12 10-21 19-21s19 9 19 21"/></g>
<text x="38" y="95" font-size="25" class="title sans" text-anchor="start" font-weight="850">60-second fit check</text>
<circle cx="44" cy="121" r="4" fill="#38bdf8"/>
<text x="58" y="126" font-size="15" class="body sans" text-anchor="start" font-weight="600">Role identity + career arc</text>
<circle cx="44" cy="147" r="4" fill="#38bdf8"/>
<text x="58" y="152" font-size="15" class="body sans" text-anchor="start" font-weight="600">Capital-program context</text>
<circle cx="44" cy="173" r="4" fill="#38bdf8"/>
<text x="58" y="178" font-size="15" class="body sans" text-anchor="start" font-weight="600">Credentials + location</text>
<text x="38" y="217" font-size="12" class="mono" text-anchor="start" font-weight="850" fill="#38bdf8">OPEN 60-SECOND PROFILE</text>
  <rect x="1" y="1" width="428" height="248" rx="27" fill="none" stroke="#29405c" stroke-opacity="0.75"/>
</svg>
      <circle cx="176" cy="224" r="5" fill="#67e8f9"/><text x="194" y="229" class="bright">net-002</text>
      <circle cx="280" cy="224" r="5" fill="#67e8f9"/><text x="298" y="229" class="bright">net-003</text>
      <circle cx="72" cy="258" r="5" fill="#67e8f9"/><text x="90" y="263" class="bright">net-004</text>
      <circle cx="176" cy="258" r="5" fill="#67e8f9"/><text x="194" y="263" class="bright">net-005</text>

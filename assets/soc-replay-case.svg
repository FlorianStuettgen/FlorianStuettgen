<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="420" viewBox="0 0 1440 420" role="img" aria-labelledby="title desc">
  <title id="title">SOC_Replay preserved reference case</title>
  <desc id="desc">A source, trace, and bundle case file showing seven stored events, a complete rule and execution trace, one high-severity detection, a hash-linked ledger, and a verified evidence bundle.</desc>
  <defs>

    <style>
      .ui{font-family:Inter,Segoe UI,Arial,sans-serif}.muted{fill:#8ea4b4}.bright{fill:#f0f7fb}.cyan{fill:#67e8f9}.green{fill:#86efac}.amber{fill:#facc6b}.red{fill:#fb7185}.label{font-size:14px;font-weight:800;letter-spacing:2px}.small{font-size:14px}.hair{stroke:#2b4050;stroke-width:1}.card{fill:#0c1822;stroke:#2b4050}.mono{font-family:Consolas,Menlo,monospace}
    </style>
  </defs>
  <rect x="1" y="1" width="1438" height="418" rx="24" fill="url(#bg)" stroke="#2b4050" stroke-width="2"/>
